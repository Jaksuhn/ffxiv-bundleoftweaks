name: Release Plugin

on:
  push:
    tags:
      - 'v*.*'

jobs:
  build-and-publish:
    uses: Jaksuhn/DynamisPublishAction@main
    with:
      plugin_id: 34
      internal_name: 'Automaton'
      output_path: "Automaton/bin/Release/Automaton/latest.zip"
    secrets:
      publisher_key: ${{ secrets.PUBLISHER_KEY }}